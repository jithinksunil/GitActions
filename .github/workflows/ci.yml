name: Next.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Force actions to run on Node 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ upgraded

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ upgraded
        with:
          node-version: 20           # you can change to 22 later

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build