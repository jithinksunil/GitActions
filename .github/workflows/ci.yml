name: Next.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Build project
        run: bun run build

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition with new image
        if: github.event_name == 'push'
        id: update-task-def
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ secrets.AWS_CLUSTER_NAME }} \
            --services ${{ secrets.AWS_SERVICE_NAME }} \
            --query 'services[0].taskDefinition' --output text)

          # Register new revision with updated image
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" \
            --query 'taskDefinition' | \
            jq --arg IMAGE "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              '.containerDefinitions[0].image = $IMAGE |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_def_arn=$NEW_TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        if: github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.AWS_CLUSTER_NAME }} \
            --service ${{ secrets.AWS_SERVICE_NAME }} \
            --task-definition ${{ steps.update-task-def.outputs.task_def_arn }}

          aws ecs wait services-stable \
            --cluster ${{ secrets.AWS_CLUSTER_NAME }} \
            --services ${{ secrets.AWS_SERVICE_NAME }}
